name: multi-task-env
version: 1.0

entrypoint:
  command: python server/app.py

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

# 🔥 THIS PART IS CRITICAL
tasks:
  - id: email
  - id: sentiment
  - id: priority

observation_space:
  type: object
  properties:
    email:
      type: string

action_space:
  type: string

reward:
  type: float
  min: 0.0
  max: 1.0
