name: multi-task-env
version: 1.0

entrypoint:
  command: python server/app.py

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

tasks:
  - id: email
    description: Email classification task
  - id: sentiment
    description: Sentiment classification task
  - id: priority
    description: Priority classification task

observation_space:
  type: object
  properties:
    email:
      type: string

action_space:
  type: string

reward:
  type: float
  min: 0.0
  max: 1.0
