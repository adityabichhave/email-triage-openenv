name: multi-task-env
version: 1.0

tasks:
  - name: email
    description: Email classification
  - name: sentiment
    description: Sentiment classification
  - name: priority
    description: Priority classification

entrypoint:
  command: python server/app.py

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

observation_space:
  type: object
  properties:
    email:
      type: string

action_space:
  type: string

reward:
  type: float
  min: 0.0
  max: 1.0
